name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        # Point to your server directory if using a monorepo
        cache-dependency-path: server/package.json

    - name: Install dependencies
      run: npm install
      working-directory: ./server

    - name: Run Build (Type Check)
      run: npm run build
      working-directory: ./server
